<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mother's Day Special ❤️</title>
    <style>
        :root {
            --neon: #ff0055;
            --gold: #ffd700;
            --bg: #050005;
            --transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* --- ЕКРАНИ ТА АНІМАЦІЯ ПЕРЕХОДІВ --- */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transform: scale(1.1);
            transition: var(--transition);
            z-index: 10;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        /* --- СТИЛІ ЕЛЕМЕНТІВ МЕНЮ --- */
        h2 { 
            margin-bottom: 30px; 
            text-shadow: 0 0 15px var(--neon); 
            letter-spacing: 2px; 
            font-size: 1.8rem;
        }

        select {
            width: 80%; max-width: 280px;
            padding: 15px; margin: 10px 0;
            border-radius: 15px; 
            border: 2px solid var(--neon);
            background: #1a1a1a; /* Темний фон, щоб було видно текст */
            color: white;
            font-size: 1.1rem;
            outline: none;
            cursor: pointer;
        }

        /* Стиль для опцій всередині списку */
        select option {
            background: #1a1a1a;
            color: white;
        }

        .btn {
            width: 80%; max-width: 280px;
            padding: 18px; margin: 15px 0;
            border-radius: 50px; 
            border: none;
            background: var(--neon); 
            color: white;
            font-size: 1.2rem; 
            font-weight: bold;
            text-align: center; 
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:active {
            transform: scale(0.92);
            box-shadow: 0 0 10px var(--neon);
        }

        /* --- ГОЛОВНА ГРА --- */
        .heart-box {
            width: 170px; height: 170px;
            filter: drop-shadow(0 0 20px var(--neon));
            animation: breathe 3s infinite ease-in-out;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        svg { fill: var(--neon); width: 100%; height: 100%; }

        @keyframes breathe { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.1); } 
        }

        #wishText { 
            margin-top: 50px; 
            font-size: 1.4rem; 
            text-align: center; 
            text-shadow: 0 0 10px var(--neon); 
            padding: 0 25px; 
            min-height: 80px;
            transition: opacity 0.5s ease;
        }

        /* --- МОДАЛЬНЕ ВІКНО (ПРОМОКОД) --- */
        #promoModal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -40%);
            width: 85%; max-width: 340px;
            background: rgba(26, 0, 26, 0.95); 
            border: 3px solid var(--gold);
            border-radius: 30px; 
            padding: 30px;
            text-align: center; 
            z-index: 1000;
            box-shadow: 0 0 50px var(--gold);
            display: none;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #promoModal.show {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .promo-title { color: var(--gold); font-size: 1.6rem; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px gold; }
        
        .promo-code { 
            font-size: 1.8rem; 
            letter-spacing: 4px; 
            background: rgba(255,215,0,0.1); 
            padding: 12px; 
            margin: 20px 0; 
            border: 2px dashed var(--gold); 
            color: white;
            font-weight: bold;
        }

        .btn-gold { 
            background: var(--gold); 
            color: black; 
            border: none; 
            padding: 15px; 
            border-radius: 50px; 
            font-weight: bold; 
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 15px var(--gold);
        }

        /* --- ІНСТРУКЦІЯ --- */
        .tg-link { 
            color: var(--gold); 
            font-weight: bold; 
            text-decoration: none; 
            display: inline-block; 
            margin-top: 15px; 
            font-size: 1.4rem;
            text-shadow: 0 0 5px var(--gold);
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <!-- ЕКРАН 1: МЕНЮ -->
    <div id="menu" class="screen active">
        <h2>ОБЕРИ МОВУ</h2>
        <select id="lang">
            <option value="uk">Українська</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
        </select>
        <button class="btn" onclick="goToGame()">ПОЧАТИ</button>
    </div>

    <!-- ЕКРАН 2: ГРА -->
    <div id="gameScreen" class="screen">
        <div class="heart-box" id="heartBtn">
            <svg viewBox="0 0 32 32">
                <path d="M16 28.5c-0.3 0-0.5-0.1-0.7-0.3-0.2-0.2-11.3-10.8-11.3-17.2 0-4.4 3.1-7.5 7.5-7.5 2.2 0 4 1 5.5 2.5 1.5-1.5 3.3-2.5 5.5-2.5 4.4 0 7.5 3.1 7.5 7.5 0 6.4-11.1 17-11.3 17.2-0.2 0.2-0.4 0.3-0.7 0.3z"/>
            </svg>
        </div>
        <div id="wishText"></div>
    </div>

    <!-- МОДАЛЬНЕ ВІКНО -->
    <div id="promoModal">
        <div class="promo-title">🎁 СЮРПРИЗ!</div>
        <p>Ти виграла промокод на 1 наліпку будь-якого розміру!</p>
        <div class="promo-code">1GH5TR8</div>
        <button class="btn-gold" onclick="goToInstruction()">ЯК ВИКОРИСТАТИ?</button>
    </div>

    <!-- ЕКРАН 3: ІНСТРУКЦІЯ -->
    <div id="instructionScreen" class="screen">
        <div style="text-align: center; padding: 20px;">
            <h2 style="color: var(--gold);">ІНСТРУКЦІЯ</h2>
            <p>Скопіюй цей промокод:</p>
            <div class="promo-code">1GH5TR8</div>
            <p>та надішли його в Telegram:</p>
            <a href="https://t.me/youtuber_simdom" class="tg-link">@youtuber_simdom</a>
            <br><br>
            <button class="btn" onclick="location.reload()">НАЗАД</button>
        </div>
    </div>

<script>
    const config = {
        uk: { wishes: ["Ти найкраща матуся! ❤️", "Люблю тебе дуже! ✨", "Ти мій всесвіт! 🌸", "Будь найщасливішою! 💖"], tap: "Торкнись серця..." },
        en: { wishes: ["You're the best mom! ❤️", "Love you so much! ✨", "You're my universe! 🌸", "Stay happy always! 💖"], tap: "Touch the heart..." },
        de: { wishes: ["Beste Mama! ❤️", "Ich liebe dich sehr! ✨", "Du bist mein Universum! 🌸", "Sei glücklich! 💖"], tap: "Berühre das Herz..." },
        ja: { wishes: ["最高のお母さん！ ❤️", "大好きだよ！ ✨", "お母さんは私の宇宙！ 🌸", "幸せに！ 💖"], tap: "ハートに触れて..." },
        zh: { wishes: ["你是最好的妈妈！ ❤️", "我爱你！ ✨", "你是我的宇宙！ 🌸", "祝你快乐！ 💖"], tap: "触摸心..." }
    };

    let clickCount = 0;
    const promoLimit = 6; // Рівно на 6-й клік
    let promoGiven = false;

    // --- КАНВАС ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speed = Math.random() * 0.4 + 0.1;
            this.opacity = Math.random() * 0.5;
        }
        update() { this.y += this.speed; if (this.y > canvas.height) this.y = -10; }
        draw() { ctx.fillStyle = `rgba(255, 0, 85, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    for(let i=0; i<40; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // --- ЛОГІКА ПЕРЕХОДІВ ---
    function switchScreen(fromId, toId) {
        document.getElementById(fromId).classList.remove('active');
        setTimeout(() => {
            document.getElementById(toId).classList.add('active');
        }, 400);
    }

    function goToGame() {
        switchScreen('menu', 'gameScreen');
        const lang = document.getElementById('lang').value;
        document.getElementById('wishText').innerText = config[lang].tap;
    }

    function handleHeartClick() {
        clickCount++;
        const lang = document.getElementById('lang').value;
        const wishes = config[lang].wishes;
        
        const wishEl = document.getElementById('wishText');
        wishEl.style.opacity = '0';
        
        setTimeout(() => {
            wishEl.innerText = wishes[Math.floor(Math.random() * wishes.length)];
            wishEl.style.opacity = '1';
            
            if (clickCount >= promoLimit && !promoGiven) {
                promoGiven = true;
                setTimeout(showPromo, 800);
            }
        }, 300);

        const hb = document.getElementById('heartBtn');
        hb.style.transform = "scale(1.3)";
        setTimeout(() => hb.style.transform = "scale(1)", 150);
    }

    function showPromo() {
        const modal = document.getElementById('promoModal');
        modal.style.display = 'block';
        setTimeout(() => modal.classList.add('show'), 10);
    }

    function goToInstruction() {
        document.getElementById('promoModal').classList.remove('show');
        setTimeout(() => {
            document.getElementById('promoModal').style.display = 'none';
            switchScreen('gameScreen', 'instructionScreen');
        }, 600);
    }

    document.getElementById('heartBtn').addEventListener('click', handleHeartClick);
</script>
</body>
</html>
