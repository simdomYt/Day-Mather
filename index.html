<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Архів проекту ❤️</title>
    <style>
        :root {
            --bg-gray: #1a1a1a;
            --line-gray: #333;
            --text-gray: #777;
            --neon: #ff0055;
            --bg-dark: #050005;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-gray);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* --- ЕКРАН ЗАКРИТТЯ --- */
        #closedOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: var(--bg-gray);
            text-align: center;
        }

        .diagonal-line {
            position: absolute;
            width: 160%;
            height: 70px;
            background: var(--line-gray);
            transform: rotate(-15deg);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .diagonal-line span {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: #111;
            text-transform: uppercase;
        }

        .info-box {
            margin-top: 220px;
            z-index: 1001;
        }

        /* --- АРХІВНИЙ КОНТЕНТ --- */
        #archiveContent {
            display: none;
            width: 100%; height: 100%;
            background: var(--bg-dark);
            position: relative;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .screen {
            position: absolute;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .screen.active { display: flex; }

        /* Стилі меню вибору мови */
        h2 { 
            margin-bottom: 25px; 
            text-shadow: 0 0 15px var(--neon); 
            font-size: 1.7rem;
            text-align: center;
        }

        select {
            width: 80%; max-width: 280px;
            padding: 15px; margin: 10px 0;
            border-radius: 15px; 
            border: 2px solid var(--neon);
            background: #1a1a1a;
            color: white;
            font-size: 1.1rem;
            outline: none;
        }

        .btn {
            width: 80%; max-width: 280px;
            padding: 18px; margin: 15px 0;
            border-radius: 50px; 
            border: none;
            background: var(--neon); 
            color: white;
            font-size: 1.2rem; 
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon);
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.92); }

        .mini-btn {
            background: none;
            border: 1px solid #444;
            color: var(--text-gray);
            padding: 8px 25px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Гра */
        .heart-box {
            width: 160px; height: 160px;
            filter: drop-shadow(0 0 20px var(--neon));
            animation: breathe 3s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #wishText { 
            margin-top: 40px; 
            font-size: 1.4rem; 
            text-align: center; 
            text-shadow: 0 0 10px var(--neon); 
            padding: 0 20px;
            min-height: 60px;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="closedOverlay">
        <div class="diagonal-line"><span>САЙТ ЗАКРИТО</span></div>
        <div class="info-box">
            <p style="color:#777; margin-bottom:15px;">Бажаєте подивитись архів сайту?</p>
            <button class="mini-btn" onclick="openArchive()">ТАК</button>
        </div>
    </div>

    <div id="archiveContent">
        <canvas id="bgCanvas"></canvas>
        
        <div id="langScreen" class="screen active">
            <h2>ОБЕРИ МОВУ</h2>
            <select id="langSelect">
                <option value="uk">Українська</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
            </select>
            <button class="btn" onclick="startArchive()">ПОЧАТИ</button>
        </div>

        <div id="gameScreen" class="screen">
            <div class="heart-box" id="heartBtn">
                <svg style="fill:var(--neon); width:100%; height:100%;" viewBox="0 0 32 32">
                    <path d="M16 28.5c-0.3 0-0.5-0.1-0.7-0.3-0.2-0.2-11.3-10.8-11.3-17.2 0-4.4 3.1-7.5 7.5-7.5 2.2 0 4 1 5.5 2.5 1.5-1.5 3.3-2.5 5.5-2.5 4.4 0 7.5 3.1 7.5 7.5 0 6.4-11.1 17-11.3 17.2-0.2 0.2-0.4 0.3-0.7 0.3z"/>
                </svg>
            </div>
            <div id="wishText"></div>
        </div>
    </div>

<script>
    const config = {
        uk: { wishes: ["Ти найкраща матуся! ❤️", "Люблю тебе дуже! ✨", "Ти мій всесвіт! 🌸", "Будь найщасливішою! 💖"], tap: "Торкнись серця..." },
        en: { wishes: ["You're the best mom! ❤️", "Love you so much! ✨", "You're my universe! 🌸", "Stay happy always! 💖"], tap: "Touch the heart..." },
        de: { wishes: ["Beste Mama! ❤️", "Ich liebe dich sehr! ✨", "Du bist mein Universum! 🌸", "Sei glücklich! 💖"], tap: "Berühre das Herz..." },
        ja: { wishes: ["最高のお母さん！ ❤️", "大好きだよ！ ✨", "お母さんは私の宇宙！ 🌸", "幸せに！ 💖"], tap: "ハートに触れて..." },
        zh: { wishes: ["你是最好的妈妈！ ❤️", "我爱你！ ✨", "你是我的宇宙！ 🌸", "祝你快乐！ 💖"], tap: "触摸心..." }
    };

    let lastIndex = -1;

    function openArchive() {
        document.getElementById('closedOverlay').style.display = 'none';
        document.getElementById('archiveContent').style.display = 'block';
        initStars();
    }

    function startArchive() {
        const lang = document.getElementById('langSelect').value;
        document.getElementById('langScreen').classList.remove('active');
        document.getElementById('gameScreen').classList.add('active');
        document.getElementById('wishText').innerText = config[lang].tap;
    }

    document.getElementById('heartBtn').onclick = function() {
        const lang = document.getElementById('langSelect').value;
        const w = config[lang].wishes;
        let newIndex;
        
        do { newIndex = Math.floor(Math.random() * w.length); } 
        while (newIndex === lastIndex);
        lastIndex = newIndex;

        const txt = document.getElementById('wishText');
        txt.style.opacity = 0;
        setTimeout(() => {
            txt.innerText = w[newIndex];
            txt.style.opacity = 1;
        }, 200);
    };

    function initStars() {
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pts = [];
        for(let i=0; i<45; i++) pts.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*0.5+0.2});
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 0, 85, 0.4)";
            pts.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.y += p.v; if(p.y > canvas.height) p.y = -5;
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
