<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mother's Day Special</title>
    <style>
        :root {
            --neon: #ff0055;
            --bg: #050005;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Меню налаштувань */
        #menu {
            position: absolute;
            z-index: 100;
            background: rgba(5, 0, 5, 0.95);
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        .menu-card {
            width: 85%;
            max-width: 300px;
            text-align: center;
        }

        h2 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--neon);
            letter-spacing: 2px;
        }

        select {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #1a1a1a;
            border: 2px solid var(--neon);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #startBtn {
            width: 100%;
            padding: 15px;
            background: var(--neon);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 0 20px var(--neon);
            cursor: pointer;
        }

        /* Основний екран */
        #gameScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            width: 100%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .heart-box {
            width: 180px;
            height: 180px;
            filter: drop-shadow(0 0 20px var(--neon));
            animation: breathe 2.5s infinite ease-in-out;
            cursor: pointer;
        }

        svg {
            fill: var(--neon);
            width: 100%;
            height: 100%;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--neon)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 30px var(--neon)); }
        }

        #wishText {
            margin-top: 50px;
            color: white;
            font-size: 1.4rem;
            text-align: center;
            text-shadow: 0 0 10px var(--neon);
            padding: 0 25px;
            min-height: 3.5rem;
            line-height: 1.4;
        }

        .hint {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div id="menu">
        <div class="menu-card">
            <h2>LANGUAGE</h2>
            <select id="lang">
                <option value="uk">Українська</option>
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
            </select>
            <button id="startBtn">START</button>
        </div>
    </div>

    <div id="gameScreen">
        <div class="heart-box" id="heartBtn">
            <svg viewBox="0 0 32 32">
                <path d="M16 28.5c-0.3 0-0.5-0.1-0.7-0.3-0.2-0.2-11.3-10.8-11.3-17.2 0-4.4 3.1-7.5 7.5-7.5 2.2 0 4 1 5.5 2.5 1.5-1.5 3.3-2.5 5.5-2.5 4.4 0 7.5 3.1 7.5 7.5 0 6.4-11.1 17-11.3 17.2-0.2 0.2-0.4 0.3-0.7 0.3z"/>
            </svg>
        </div>
        <div id="wishText"></div>
        <div class="hint">TAP TO FEEL LOVE</div>
    </div>

<script>
    const config = {
        uk: { wishes: ["Ти найкраща матуся! ❤️", "Люблю тебе дуже! ✨", "Дякую за все, що ти робиш! 🌸", "Будь завжди щасливою! 💖"], tap: "Торкнись серця..." },
        en: { wishes: ["You are the best mom! ❤️", "I love you so much! ✨", "Thanks for everything! 🌸", "Stay happy always! 💖"], tap: "Touch the heart..." },
        de: { wishes: ["Beste Mama der Welt! ❤️", "Ich liebe dich sehr! ✨", "Danke für alles! 🌸", "Sei immer glücklich! 💖"], tap: "Berühre das Herz..." },
        ja: { wishes: ["最高のお母さん！ ❤️", "大好きだよ！ ✨", "いつもありがとう！ 🌸", "幸せでいてね！ 💖"], tap: "ハートに触れて..." },
        zh: { wishes: ["你是最好的妈妈！ ❤️", "我非常爱你！ ✨", "谢谢你所做的一切！ 🌸", "祝你永远快乐！ 💖"], tap: "触摸心..." }
    };

    const menu = document.getElementById('menu');
    const gameScreen = document.getElementById('gameScreen');
    const startBtn = document.getElementById('startBtn');
    const heartBtn = document.getElementById('heartBtn');
    const wishText = document.getElementById('wishText');
    const langSelect = document.getElementById('lang');

    // --- КАНВАС (Анімований фон) ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speed = Math.random() * 0.5 + 0.2;
            this.opacity = Math.random() * 0.5;
        }
        update() {
            this.y += this.speed;
            if (this.y > canvas.height) this.y = -10;
        }
        draw() {
            ctx.fillStyle = `rgba(255, 0, 85, ${this.opacity})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for(let i=0; i<60; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // --- ЛОГІКА ---
    function start() {
        menu.style.opacity = '0';
        setTimeout(() => {
            menu.style.display = 'none';
            gameScreen.style.display = 'flex';
            setTimeout(() => gameScreen.style.opacity = '1', 50);
            const l = langSelect.value;
            wishText.innerText = config[l].tap;
        }, 400);
    }

    function showWish() {
        const l = langSelect.value;
        const wishes = config[l].wishes;
        wishText.style.opacity = '0';
        
        setTimeout(() => {
            wishText.innerText = wishes[Math.floor(Math.random() * wishes.length)];
            wishText.style.opacity = '1';
        }, 200);

        heartBtn.style.transform = "scale(1.3)";
        setTimeout(() => heartBtn.style.transform = "scale(1)", 100);
    }

    // Підтримка для всіх типів екранів
    startBtn.addEventListener('click', start);
    startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });

    heartBtn.addEventListener('click', showWish);
    heartBtn.addEventListener('touchstart', (e) => { e.preventDefault(); showWish(); });

</script>
</body>
</html>
